name: Smart AI Ticketing Agent

on:
  push:
    branches: [ "master" ]  # Keeping it on master since that is your branch name!

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Authenticate securely with Docker Hub using your GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Set up Docker Buildx (A tool that speeds up container builds)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Build the image and push it to your public/private repository
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # FIX: Perfectly aligned under 'context' and 'push' with correct indentation
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}
